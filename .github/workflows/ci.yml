name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      # Generate the Prisma client before typecheck/build: api/src imports
      # @prisma/client, so tsc fails without it. A dummy DATABASE_URL is enough
      # (generate never connects). Mirrors api/Dockerfile.
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
      - run: npm run typecheck
      - run: npm run build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
